server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:dev-secret-change-in-production-must-be-32-chars}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/orders/**
        - id: inventory-service
          uri: ${INVENTORY_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/restaurants/**,/menu-items/**
        - id: driver-service
          uri: ${DRIVER_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/drivers/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
