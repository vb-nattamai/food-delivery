name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  # ─── Order Service (Java 21 + Maven) ────────────────────────────────────────
  order-service:
    name: Order Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: order-service
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
      - name: Build & test
        run: mvn -B verify --no-transfer-progress
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: order-service-test-results
          path: order-service/target/surefire-reports/

  # ─── Inventory Service (Python 3.11 + FastAPI) ──────────────────────────────
  inventory-service:
    name: Inventory Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: inventory-service
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Type check (mypy)
        run: mypy . --ignore-missing-imports
      - name: Run tests
        run: pytest --tb=short -q

  # ─── Driver Service (Go 1.21) ───────────────────────────────────────────────
  driver-service:
    name: Driver Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: driver-service
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go 1.21
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true
      - name: Download modules
        run: go mod download
      - name: Vet
        run: go vet ./...
      - name: Run tests
        run: go test ./... -race -coverprofile=coverage.out
      - name: Build
        run: go build -o /dev/null ./cmd/driver

  # ─── Notification Service (Node.js + TypeScript) ────────────────────────────
  notification-service:
    name: Notification Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: notification-service
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: notification-service/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run typecheck
      - name: Run tests
        run: npm test

  # ─── API Gateway (Kotlin + Gradle) ──────────────────────────────────────────
  api-gateway:
    name: API Gateway
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-gateway
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"
      - name: Build & test
        run: gradle test --no-daemon
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-gateway-test-results
          path: api-gateway/build/reports/tests/
